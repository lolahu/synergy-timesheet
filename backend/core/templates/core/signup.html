<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Sign Up — Synergy Timesheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/mobile.css' %}" />
  </head>
  <body>
    <div class="page">
      <h3>Create Account</h3>
      <p class="text-muted">Your account will be reviewed by an admin before you can log in.</p>

      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="field">
          <label>Email</label>
          <input
            name="email"
            type="email"
            required
            placeholder="you@example.com"
            inputmode="email"
            autocomplete="email"
            value="{{ prev.email }}"
          />
        </div>

        <div class="field">
          <label>Full Name</label>
          <input
            name="name"
            type="text"
            required
            placeholder="Your full name"
            autocomplete="name"
            value="{{ prev.name }}"
          />
        </div>

        <div class="field">
          <label>Phone <span class="hint">(optional)</span></label>
          <input
            name="phone"
            type="tel"
            placeholder="e.g. 416-555-0123"
            inputmode="tel"
            autocomplete="tel"
            value="{{ prev.phone }}"
          />
        </div>

        <div class="field">
          <label>Password</label>
          <input
            name="password1"
            type="password"
            required
            autocomplete="new-password"
            placeholder="At least 8 characters"
          />
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <input
            name="password2"
            type="password"
            required
            autocomplete="new-password"
            placeholder="Repeat your password"
          />
        </div>

        <button type="submit" class="btn btn-primary">Request Account</button>
      </form>

      <a href="/login/" class="back-link">← Already have an account? Log in</a>
    </div>
  </body>
</html>
