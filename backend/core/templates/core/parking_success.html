<!doctype html>
<html>
  <head>

    <title>Parking Submitted</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/mobile.css' %}" />
  </head>
  <body>
    <div class="page success-page">
      <div class="icon">✅</div>

</html>
