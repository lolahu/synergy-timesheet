<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reset Password — Synergy Timesheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/mobile.css' %}" />
  </head>
  <body>
    <div class="page">
      <h3>Reset Password</h3>
      <p class="text-muted">Enter your email and we'll send you a link to reset your password.</p>

      <form method="post">
        {% csrf_token %}
        <div class="field">
          <label>Email</label>
          <input
            name="email"
            type="email"
            required
            placeholder="you@example.com"
            inputmode="email"
            autocomplete="email"
          />
        </div>
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </form>

      <a href="/login/" class="back-link">← Back to Login</a>
    </div>
  </body>
</html>
