<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Account Requested — Synergy Timesheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/mobile.css' %}" />
  </head>
  <body>
    <div class="page success-page">
      <div class="icon">✅</div>
      <h2>Request Submitted!</h2>
      <p>
        Your account request for <strong>{{ email }}</strong> has been received.
        An admin will review and activate your account shortly.
      </p>
      <p class="text-muted">You'll be able to log in once your account is approved.</p>
      <div class="actions">
        <a href="/login/" class="btn btn-primary">Go to Login</a>
      </div>
    </div>
  </body>
</html>
