<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Login — Synergy Timesheet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    {% load static %}
    <link rel="stylesheet" href="{% static 'core/mobile.css' %}" />
  </head>
  <body>
    <div class="page">
      <h3>Login</h3>

      {% if error %}
        <div class="alert-error">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}

        <div class="field">
          <label>Email</label>
          <input
            name="email"
            type="email"
            required
            placeholder="you@example.com"
            inputmode="email"
            autocomplete="email"
            value="{{ request.POST.email }}"
          />
        </div>

        <div class="field">
          <label>Password</label>
          <input
            name="password"
            type="password"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn btn-primary">Log In</button>
      </form>

      <div class="nav-links">
        <a href="/password-reset/" class="back-link">Forgot your password?</a>
        <a href="/signup/" class="back-link">Don't have an account? Sign up</a>
        <a href="/" class="back-link">← Back to Home</a>
      </div>
    </div>
  </body>
</html>
